services:
  - type: web
    name: lost-lead-booking-agent
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SEND_LIVE_MESSAGES
        value: "false"
      - key: SEND_LIVE_CALENDAR
        value: "false"
      - key: CHECK_CALENDAR_AVAILABILITY
        value: "true"
      - key: PREFER_CUSTOMER_WHATSAPP
        value: "false"
      - key: BUSINESS_NAME
        value: Demo Roofing Co.
      - key: BUSINESS_TIMEZONE
        value: America/New_York
      - key: BUSINESS_HOURS_START
        value: "08:00"
      - key: BUSINESS_HOURS_END
        value: "18:00"
      - key: DEFAULT_APPOINTMENT_MINUTES
        value: "60"
      - key: AVAILABLE_SLOT_INTERVAL_MINUTES
        value: "60"
      - key: MAX_AVAILABLE_SLOTS
        value: "3"
      - key: LEAD_VIEWER_TOKEN
        generateValue: true
      - key: LEADS_VIEW_KEY
        generateValue: true
